<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto - Auditor Implacable</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/assets/css/global.css">
</head>

<body class="bg-[#f4f6f8] text-gray-800">

<nav class="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
  <div class="container-custom flex justify-between items-center py-4">

    <div class="flex items-center gap-2 font-semibold text-lg">
      <div class="w-4 h-4 bg-green-500 rounded-sm"></div>
      Auditor Implacable
    </div>

    <div class="flex gap-8 text-sm font-medium text-gray-600">
      <a href="/index.html">Inicio</a>
      <a href="/soluciones.html">Soluciones</a>
      <a href="/beneficios.html">Beneficios</a>
      <a href="/precios.html">Precios</a>
      <a href="/contacto.html" class="text-green-600 font-semibold">Contacto</a>
    </div>

    <a href="#"
       class="bg-green-600 text-white px-5 py-2 rounded-xl text-sm font-semibold">
       Solicitar Demo
    </a>

  </div>
</nav>


<section class="py-24">
  <div class="container-custom grid md:grid-cols-2 gap-12">

    <!-- INFO -->
    <div>
      <h2 class="text-4xl font-bold mb-6">
        Hablemos de su próxima auditoría
      </h2>

      <p class="text-gray-600 mb-8">
        Descubre cómo nuestro sistema puede ayudarte a reducir pérdidas
        y mejorar el control financiero.
      </p>

      <div class="space-y-4 text-gray-700">
        <p>📧 contacto@auditorimplacable.com</p>
        <p>📞 +52 123 456 7890</p>
      </div>
    </div>

    <!-- FORM -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <form class="space-y-6">

        <div>
          <label class="block text-sm font-medium mb-2">Nombre</label>
          <input type="text"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Correo</label>
          <input type="email"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Mensaje</label>
          <textarea rows="4"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"></textarea>
        </div>

        <button
          class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition">
          Enviar mensaje
        </button>

      </form>
    </div>

  </div>
</section>

</body>
</html>
